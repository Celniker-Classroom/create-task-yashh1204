<!-- For my project, I will be creating a websitethat allows the user to keep their grades organized in one place ( a grade book). My gradebook will be organized so the user can see their classes, and the weight of each assignment. My gradebook will total each assignment with their weightings and give a grade that they currently have.  My gradebook will allow the user to put in "fake" assignments that let them see how their grade will change based on new assignments. There will also be an option to edit the grade in a "what if" mode that allows the user to see what their grade would be if they didn't, or did get a better/worse grade on an assignment. -->
<!DOCTYPE html>
<html>
<head>
    <title>Gradebook Task</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .box { background: white; padding: 20px; border-radius: 8px; max-width: 400px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; }
        button { width: 95%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        #results { margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>My Gradebook</h2>
    <input type="text" id="name" placeholder="Assignment Name">
    <input type="number" id="score" placeholder="Score (0-100)">
    <input type="number" id="weight" placeholder="Weight (%)">
    <button onclick="addEntry()">Add Assignment</button>

    <div id="results">
        <p>Assignments: <span id="listDisplay">None</span></p>
        <h3>Current Grade: <span id="finalGrade">0</span>%</h3>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
