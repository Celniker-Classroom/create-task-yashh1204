<!-- For my project, I will be creating a websitethat allows the user to keep their grades organized in one place ( a grade book). My gradebook will be organized so the user can see their classes, and the weight of each assignment. My gradebook will total each assignment with their weightings and give a grade that they currently have.  My gradebook will allow the user to put in "fake" assignments that let them see how their grade will change based on new assignments. There will also be an option to edit the grade in a "what if" mode that allows the user to see what their grade would be if they didn't, or did get a better/worse grade on an assignment. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grade Book Wireframe</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Grade Book</h1>
    </header>
    
    <main>
        <section id="classes">
            <h2>Classes</h2>
            <div class="class">
                <h3>Class Name 1</h3>
                <div class="assignments">
                    <h4>Assignments</h4>
                    <ul>
                        <li>Assignment 1 - Weight: 20% - Grade: 85%</li>
                        <li>Assignment 2 - Weight: 30% - Grade: 92%</li>
                        <li>Assignment 3 - Weight: 50% - Grade: 78%</li>
                    </ul>
                </div>
                <div class="current-grade">
                    <p>Current Grade: 83%</p>
                </div>
            </div>
            <!-- Add more classes as needed -->
        </section>
        
        <section id="add-assignment">
            <h2>Add Fake Assignment</h2>
            <form>
                <label for="class-select">Select Class:</label>
                <select id="class-select">
                    <option>Class Name 1</option>
                </select>
                <label for="assignment-name">Assignment Name:</label>
                <input type="text" id="assignment-name">
                <label for="weight">Weight (%):</label>
                <input type="number" id="weight">
                <label for="grade">Grade (%):</label>
                <input type="number" id="grade">
                <button type="submit">Add Assignment</button>
            </form>
        </section>
        
        <section id="what-if">
            <h2>What If Mode</h2>
            <form>
                <label for="edit-assignment">Select Assignment:</label>
                <select id="edit-assignment">
                    <option>Assignment 1</option>
                    <option>Assignment 2</option>
                    <option>Assignment 3</option>
                </select>
                <label for="new-grade">New Grade (%):</label>
                <input type="number" id="new-grade">
                <button type="submit">Calculate What If</button>
            </form>
            <div class="hypothetical-grade">
                <p>Hypothetical Grade: --</p>
            </div>
        </section>
    </main>
    
    <footer>
        <p>Grade Book Wireframe</p>
    </footer>
</body>
</html>
